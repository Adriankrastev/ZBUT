<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Форма</title>

<style>
body{
    background:#f2f2f2;
    font-family:"Times New Roman", serif;
}

.container{
    width:700px;
    margin:20px auto;
    background:#d3d3d3;
    padding-bottom:30px;
    border:1px solid #999;
}

h1{
    text-align:center;
    font-size:32px;
    margin:10px 0;
}

.section-title{
    background:#333;
    color:white;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    padding:5px;
    margin-top:15px;
}

form{
    text-align:center;
}

.row{
    margin:15px 0;
}

label{
    display:inline-block;
    width:120px;
    text-align:right;
    margin-right:10px;
    font-size:18px;
}

input[type="text"]{
    width:220px;
    height:28px;
    background:#0066cc;
    border:none;
    color:white;
    padding-left:10px;
    font-size:16px;
}

textarea{
    width:350px;
    height:120px;
    resize:none;
    font-size:14px;
}

.radio-group,
.checkbox-group{
    margin:15px 0;
    font-size:18px;
}

.buttons{
    margin-top:25px;
}

button{
    background:#0066cc;
    color:white;
    border:none;
    padding:10px 20px;
    font-size:22px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#004c99;
}
</style>
</head>

<body>

<div class="container">

<h1>ВАШИТЕ ПРЕПОРЪКО ЗА САЙТА</h1>

<form action="https://jo6u6prf.forms.app/vashite-preporko-za-sajtaosnovni-dannidoplnitelna-informaciyapreporki" method="get|post|>

<div class="section-title">ОСНОВНИ ДАННИ</div>

<div class="row">
<label>ИМЕ</label>
<input type="text">
</div>

<div class="row">
<label>ПРЕЗИМЕ</label>
<input type="text">
</div>

<div class="row">
<label>ФАМИЛИЯ</label>
<input type="text">
</div>

<div class="row">
<label>АДРЕС</label>
<textarea></textarea>
</div>

<div class="section-title">ДОПЪЛНИТЕЛНА ИНФОРМАЦИЯ</div>

<div class="radio-group">
<input type="radio" name="gender"> МЪЖ
<br><br>
<input type="radio" name="gender"> ЖЕНА
</div>

<div class="checkbox-group">
<input type="checkbox"> РАБОТИТЕ ЛИ?
<br><br>
<input type="checkbox"> УЧИТЕ ЛИ?
</div>

<div class="section-title">ПРЕПОРЪКИ</div>

<div class="row">
<textarea placeholder="ТУК НАПИШЕТЕ ПРЕПОРЪКА"></textarea>
</div>

<div class="buttons">
<button type="submit">ИЗПРАТИ</button>
<button type="reset">ИЗЧИСТИ</button>
</div>

</form>

</div>

</body>
</html>
