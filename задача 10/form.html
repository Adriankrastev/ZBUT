<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>form</title>
	
<link href="style.css" rel="stylesheet" type="text/css">
	
</head>

<body>

<div class="container">

<h1>ВАШИТЕ ПРЕПОРЪКО ЗА САЙТА</h1>

<form>

<div class="section-title">ОСНОВНИ ДАННИ</div>

<div class="row">
<label>ИМЕ</label>
<input type="text">
</div>

<div class="row">
<label>ПРЕЗИМЕ</label>
<input type="text">
</div>

<div class="row">
<label>ФАМИЛИЯ</label>
<input type="text">
</div>

<div class="row">
<label>АДРЕС</label>
<textarea></textarea>
</div>

<div class="section-title">ДОПЪЛНИТЕЛНА ИНФОРМАЦИЯ</div>

<div class="radio-group">
<input type="radio" name="gender"> МЪЖ
<br><br>
<input type="radio" name="gender"> ЖЕНА
</div>

<div class="checkbox-group">
<input type="checkbox"> РАБОТИТЕ ЛИ?
<br><br>
<input type="checkbox"> УЧИТЕ ЛИ?
</div>

<div class="section-title">ПРЕПОРЪКИ</div>

<div class="row">
<textarea placeholder="ТУК НАПИШЕТЕ ПРЕПОРЪКА"></textarea>
</div>

<div class="buttons">
<button type="submit">ИЗПРАТИ</button>
<button type="reset">ИЗЧИСТИ</button>
</div>

</form>

</div>

</body>
</html>
